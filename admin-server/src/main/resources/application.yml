server:
    port: 9090

spring:
    application:
        name: admin-server
    security:
        user:
            name: admin
            password: "admin123"

eureka:
    client:
        service-url:
            defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
    endpoints:
        web:
            exposure:
                include: "*"
    endpoint:
        health:
            show-details: always

