server:
  port: ${SERVER_PORT:8083}
  forward-headers-strategy: FRAMEWORK
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

  application:
    name: auth-service

  datasource:
    url: ${DB_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  data:
    redis:
      url: ${REDIS_URL}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${APP_OAUTH2_GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
            scope:
              - profile
              - email

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  boot:
    admin:
      client:
        url: ${ADMIN_SERVER_URL:http://localhost:9090}
        instance:
          prefer-ip: true
        username: ${ADMIN_USERNAME:admin}
        password: ${ADMIN_PASSWORD:admin123}

  cloud:
    loadbalancer:
      retry:
        enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true

  instance:
    prefer-ip-address: true

# =========================
# Custom App Config
# =========================
app:
  auth:
    token-secret: ${APP_AUTH_TOKEN_SECRET}
    token-expiration-msec: ${APP_AUTH_TOKEN_EXPIRATION_MSEC:864000000}
    refresh-token-expiration-msec: ${APP_AUTH_REFRESH_TOKEN_EXPIRATION_MSEC:2592000000}
    reset-password-url: ${APP_RESET_PASSWORD_URL:http://localhost:4200/reset-password}

  oauth2:
    redirectUri: ${APP_OAUTH2_REDIRECT_URI:http://localhost:4200/login}

management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator

  endpoint:
    health:
      show-details: always

  health:
    mail:
      enabled: false

  info:
    env:
      enabled: true

logging:
  level:
    root: INFO
    com.app.quantitymeasurement: INFO
    org.springframework.security: DEBUG