# ââ Eureka Client Configuration âââââââââââââââââââââââââââââââââââââââââââââââ
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.healthcheck.enabled=true
eureka.client.registry-fetch-interval-seconds=10
eureka.client.initial-instance-info-replication-interval-seconds=10
eureka.client.eureka-server-connect-timeout-seconds=5
eureka.client.eureka-server-read-timeout-seconds=8
eureka.instance.prefer-ip-address=true
spring.cloud.loadbalancer.retry.enabled=true

# ── Database Configuration (PostgreSQL - Neon) ─────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ââ JPA Configuration ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ââ Redis Configuration ââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
# In Docker, these are overridden by SPRING_DATA_REDIS_HOST and SPRING_DATA_REDIS_PORT
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}

# Disable Redis repository auto-configuration warnings in this service.
# Token blacklist gracefully falls back to in-memory when Redis isn't configured.
spring.data.redis.repositories.enabled=false

