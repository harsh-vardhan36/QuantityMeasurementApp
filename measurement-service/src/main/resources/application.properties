spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# ââ JWT Configuration ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
app.auth.token-secret=${APP_AUTH_TOKEN_SECRET}
app.auth.token-expiration-msec=${APP_AUTH_TOKEN_EXPIRATION_MSEC:864000000}
app.auth.refresh-token-expiration-msec=${APP_AUTH_REFRESH_TOKEN_EXPIRATION_MSEC:2592000000}

# ââ OAuth2 Configuration âââââââââââââââââââââââââââââââââââââââââââââââââââââââ
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${APP_OAUTH2_GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
spring.security.oauth2.client.registration.google.scope=profile,email
app.oauth2.redirectUri=${APP_OAUTH2_REDIRECT_URI:http://localhost:4200/login}

# ââ Logging ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=INFO
logging.level.org.springframework.security=WARN

# ââ Actuator âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always
management.health.redis.enabled=false
management.info.env.enabled=true

