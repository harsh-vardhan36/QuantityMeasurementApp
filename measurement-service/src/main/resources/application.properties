# ==============================
# Default Application Configuration
# ==============================

# ââ Spring Profile âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
# Default profile is 'dev' if not specified
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ââ Server Configuration âââââââââââââââââââââââââââââââââââââââââââââââââââââââ
server.port=${SERVER_PORT:8081}

# ââ Application Name âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
