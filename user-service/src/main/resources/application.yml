server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: user-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-proud-sea-aml792rn-pooler.c-5.us-east-1.aws.neon.tech/user_db?sslmode=require}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:npg_z9MAJS5hrVgN}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      max-lifetime: 30000
      idle-timeout: 10000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  boot:
    admin:
      client:
        url: ${ADMIN_SERVER_URL:http://localhost:9090}
        username: ${ADMIN_USERNAME:admin}
        password: ${ADMIN_PASSWORD:admin}
        instance:
          prefer-ip: true

  cloud:
    loadbalancer:
      retry:
        enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
    healthcheck:
      enabled: true
    registry-fetch-interval-seconds: 10

  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.quantitymeasurement.user_service: INFO
    org.springframework.web: INFO